name: Reporte de error
description: Reporta un comportamiento incorrecto o inesperado en TheosferaCore.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar un error en TheosferaCore.

        Incluye pasos claros y evidencia suficiente para poder reproducirlo.

  - type: textarea
    id: description
    attributes:
      label: Descripción del error
      description: Explica qué ocurrió.
      placeholder: Al ejecutar...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
      description: Explica qué debería haber ocurrido.
      placeholder: Debería...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Detalla los pasos exactos para provocar el error.
      placeholder: |
        1. 
        2. 
        3.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Versión de TheosferaCore
      placeholder: "Ejemplo: 0.1.0"
    validations:
      required: true

  - type: input
    id: server
    attributes:
      label: Software y versión del servidor
      placeholder: "Ejemplo: Purpur 1.21.11"
    validations:
      required: true

  - type: input
    id: java
    attributes:
      label: Versión de Java
      placeholder: "Ejemplo: Java 21"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Registros o errores de consola
      description: Pega únicamente la parte relevante. Elimina contraseñas, tokens, IP privadas u otros datos sensibles.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Información adicional
      description: Capturas, configuración relevante o cualquier otro contexto.